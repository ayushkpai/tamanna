<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Tamanna</title>

    <link rel="icon" href="images/favicon.ico" />
    <link rel="stylesheet" href="index.css" />

    <script src="https://cdn.tailwindcss.com"></script>
  </head>

  <body>
    <div class="blob one"></div>

    <div class="blob two"></div>

    <header class="fixed top-0 left-0 right-0 z-50 px-4 pt-3">
      <div
        class="max-w-7xl mx-auto h-14 sm:h-16 glass rounded-2xl sm:rounded-3xl flex items-center justify-between px-4 sm:px-5"
      >
        <div class="flex items-center gap-3">
          <div
            class="h-10 w-10 rounded-xl bg-gradient-to-br from-violet-500 to-pink-500 flex items-center justify-center"
          >
            <img src="images/logo.png" class="h-6 w-6" />
          </div>

          <p class="text-pink-700 text-2xl font-bold">Tamanna</p>
          <p class="text-xs text-white/40">Access more of you</p>
        </div>

        <button onclick="openMenu()" class="text-2xl">☰</button>
      </div>
    </header>

    <header class="fixed top-20 left-0 right-0 z-40 px-4">
      <div
        class="max-w-7xl mx-auto h-14 glass rounded-2xl flex items-center justify-between px-4 sm:px-5"
      >
        <p class="font-semibold">
          Access consciousness tools to access more of you
        </p>
      </div>
    </header>

    <div id="menu" class="hidden fixed inset-0 z-50">
      <div
        onclick="closeMenu()"
        class="absolute inset-0 bg-black/70 backdrop-blur-sm"
      ></div>

      <div
        class="absolute right-0 top-0 h-full w-full sm:w-96 bg-[#080b14] border-l border-white/10 p-6 sm:p-8 overflow-y-auto"
      >
        <button onclick="closeMenu()" class="text-3xl hover:text-violet-400">
          ×
        </button>

        <div class="text-center mt-8 sm:mt-10">
          <img
            src="images/logo.png"
            class="h-20 w-20 sm:h-24 sm:w-24 mx-auto rounded-3xl bg-gradient-to-br from-violet-500 to-pink-500 p-3"
          />

          <h2 class="text-2xl sm:text-3xl font-bold mt-5">Tamanna</h2>

          <p class="text-gray-400 mt-2">Navya</p>
        </div>

        <div class="glass rounded-3xl p-6 mt-8">
          <h3 class="text-xl font-semibold">About</h3>

          <p class="text-gray-400 mt-3"></p>
        </div>
      </div>
    </div>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 pt-24 sm:pt-32 pb-10">
      <section
        class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-5 mt-10 sm:mt-14"
      >
        <div class="glass rounded-3xl p-6 card">
          <h2 class="text-xl font-semibold">Access Bars</h2>

          <p class="text-gray-400 mt-3">...</p>

          <button
            onclick="openModal('accessbars')"
            class="mt-6 text-violet-400 hover:text-violet-300"
          >
            View
          </button>
        </div>

        <div class="glass rounded-3xl p-6 card">
          <h2 class="text-xl font-semibold">Access Body Process</h2>

          <p class="text-gray-400 mt-3">...</p>

          <button
            onclick="openModal('accessbodyproccess')"
            class="mt-6 text-violet-400 hover:text-violet-300"
          >
            View
          </button>
        </div>

        <div class="glass rounded-3xl p-6 card">
          <h2 class="text-xl font-semibold">Access Facelift</h2>

          <p class="text-gray-400 mt-3">...</p>

          <button
            onclick="openModal('accessfacelift')"
            class="mt-6 text-violet-400 hover:text-violet-300"
          >
            View
          </button>
        </div>

        <div class="glass rounded-3xl p-6 card">
          <h2 class="text-xl font-semibold">Symphony of Possiblities</h2>

          <p class="text-gray-400 mt-3">...</p>

          <button
            onclick="openModal('symphonyofpossiblities')"
            class="mt-6 text-violet-400 hover:text-violet-300"
          >
            View
          </button>
        </div>
      </section>
    </main>

    <div
      id="modal"
      class="hidden fixed inset-0 z-[60] bg-black/80 backdrop-blur overflow-y-auto flex justify-center items-start sm:items-center p-4"
    >
      <div
        id="modalBox"
        class="glass rounded-3xl w-full max-w-lg my-6 max-h-[90vh] overflow-y-auto p-5 sm:p-8"
      >
        <div class="flex justify-end">
          <button onclick="closeModal()" class="text-3xl hover:text-violet-400">
            ×
          </button>
        </div>

        <h2 id="modalTitle" class="text-2xl sm:text-3xl font-bold mb-5"></h2>

        <div
          id="modalText"
          class="text-gray-400 leading-7 whitespace-pre-wrap break-words"
        ></div>
      </div>
    </div>
    <script src="index.js"></script>
  </body>
</html>
